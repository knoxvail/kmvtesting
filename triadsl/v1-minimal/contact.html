<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact | Triad Senior Living</title>
<meta name="description" content="Contact Triad Senior Living at info@triadsl.com.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#41607F;
  --grey:#939498;
  --ink:#000000;
  --bg:#FCFCFB;
  --hair:#E4E4E2;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Inter",system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:16px;line-height:1.65;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
.wrap{max-width:1160px;width:100%;margin:0 auto;padding-left:clamp(24px,6vw,72px);padding-right:clamp(24px,6vw,72px)}
a{color:inherit}

header{padding:30px 0}
.nav{display:flex;justify-content:space-between;align-items:center}
.brand img{height:42px;width:auto;display:block}
.nav-link{font-size:12px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;text-decoration:none;border-bottom:1px solid var(--ink);padding-bottom:3px}
.nav-link:hover{color:var(--blue);border-color:var(--blue)}

main{flex:1;display:flex;align-items:center}
.contact{padding-top:clamp(80px,10vh,140px);padding-bottom:clamp(80px,10vh,140px)}
.eyebrow{font-size:12px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);margin-bottom:34px}
.contact p{max-width:34em;margin-bottom:44px}
.email{font-family:"Source Serif 4",Georgia,serif;font-weight:500;font-size:clamp(2rem,6vw,4.6rem);letter-spacing:-0.015em;text-decoration:none;border-bottom:3px solid var(--ink);padding-bottom:6px}
.email:hover{color:var(--blue);border-color:var(--blue)}

footer{border-top:1px solid var(--hair);padding:34px 0 44px}
.foot{display:flex;justify-content:space-between;gap:16px;font-size:13px}
.foot a{text-decoration:none}
.foot a:hover{color:var(--blue)}
@media (max-width:760px){.foot{flex-direction:column}}

@media (prefers-reduced-motion: no-preference){
  .fade{opacity:0;transform:translateY(14px);animation:fadeUp .9s cubic-bezier(.22,.61,.36,1) forwards}
  .fade.d1{animation-delay:.12s}
  .fade.d2{animation-delay:.24s}
  @keyframes fadeUp{to{opacity:1;transform:none}}
}
</style>
</head>
<body>

<header class="wrap">
  <nav class="nav" aria-label="Primary">
    <a class="brand" href="index.html"><img src="logo.png" alt="Triad Senior Living"></a>
    <a class="nav-link" href="index.html">Home</a>
  </nav>
</header>

<main>
  <div class="wrap contact">
    <p class="eyebrow fade">Contact</p>
    <p class="fade d1">For more information regarding Triad Senior Living, please email us.</p>
    <a class="email fade d2" href="mailto:info@triadsl.com">info@triadsl.com</a>
  </div>
</main>

<footer>
  <div class="wrap foot">
    <span>&copy; 2026 Triad Senior Living</span>
    <a href="mailto:info@triadsl.com">info@triadsl.com</a>
  </div>
</footer>

</body>
</html>
