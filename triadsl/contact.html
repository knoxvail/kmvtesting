<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact | Triad Senior Living</title>
<meta name="description" content="Contact Triad Senior Living at info@triadsl.com.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Inter:wght@400;500;600&family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#41607F;
  --grey:#939498;
  --ink:#000000;
  --bg:#FCFCFB;
  --hair:#E4E4E2;
  --hair-dark:rgba(255,255,255,.18);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Inter",system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:16px;line-height:1.65;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
.wrap{max-width:1280px;width:100%;margin:0 auto;padding-left:clamp(24px,6vw,88px);padding-right:clamp(24px,6vw,88px)}
a{color:inherit}

header{position:sticky;top:0;z-index:50;background:rgba(252,252,251,.96);border-bottom:1px solid var(--hair)}
.nav{display:flex;justify-content:space-between;align-items:center;padding:22px 0}
.brand{display:flex;align-items:center;gap:12px;text-decoration:none;transition:opacity .3s ease}
.brand img{height:34px;width:auto;display:block}
.brand-word{font-family:"Cinzel",Georgia,serif;font-weight:600;font-size:15px;letter-spacing:.12em;white-space:nowrap}
.nav-links{display:flex;gap:44px;align-items:center}
.nav-links a{font-size:12px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;text-decoration:none;white-space:nowrap;position:relative;transition:color .2s ease}
.nav-links a::after{content:"";position:absolute;left:0;bottom:-6px;width:100%;height:1px;background:var(--blue);transform:scaleX(0);transform-origin:left;transition:transform .3s ease}
.nav-links a:hover{color:var(--blue)}
.nav-links a:hover::after{transform:scaleX(1)}

main{flex:1;display:flex;align-items:center;position:relative}
.contact{position:relative;z-index:2;padding-top:clamp(100px,13vh,170px);padding-bottom:clamp(100px,13vh,170px)}
.kicker{display:flex;align-items:center;gap:18px;font-size:12px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--blue);margin-bottom:44px}
.kicker::before{content:"";display:block;width:52px;height:1px;background:var(--blue)}
.contact p.lede{max-width:34em;margin-bottom:52px;font-size:1.125rem}
.email{display:inline-block;font-family:"Source Serif 4",Georgia,serif;font-weight:500;font-size:clamp(2rem,6.6vw,5.8rem);letter-spacing:-0.02em;line-height:1.1;text-decoration:none;transition:color .25s ease}
.email:hover{color:var(--blue)}
.btn-row{margin-top:64px}
.btn{display:inline-block;font-size:12px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;text-decoration:none;border:1px solid var(--ink);padding:16px 38px;transition:background .25s ease,color .25s ease}
.btn:hover{background:var(--ink);color:#fff}

footer{background:var(--ink);color:#fff;padding:clamp(60px,8vh,90px) 0 44px}
.foot-mark{display:flex;align-items:center;gap:22px;margin-bottom:56px}
.foot-word{font-family:"Cinzel",Georgia,serif;font-size:clamp(1.2rem,2.6vw,1.9rem);letter-spacing:.14em}
.foot-meta{display:flex;justify-content:space-between;gap:16px;border-top:1px solid var(--hair-dark);padding-top:26px;font-size:13px;color:var(--grey)}
.foot-meta a{color:#fff;text-decoration:none;transition:color .2s ease}
.foot-meta a:hover{color:var(--grey)}
@media (max-width:560px){.nav-links{gap:22px}.foot-meta{flex-direction:column}}

@media (prefers-reduced-motion: no-preference){
  .fade{opacity:0;transform:translateY(18px);animation:fadeUp .9s cubic-bezier(.22,.61,.36,1) forwards}
  .fade.d1{animation-delay:.12s}
  .fade.d2{animation-delay:.24s}
  .fade.d3{animation-delay:.36s}
  @keyframes fadeUp{to{opacity:1;transform:none}}
}
</style>
