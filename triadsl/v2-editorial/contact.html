<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact | Triad Senior Living</title>
<meta name="description" content="Contact Triad Senior Living at info@triadsl.com.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#41607F;
  --grey:#939498;
  --ink:#000000;
  --bg:#FCFCFB;
  --hair:#E4E4E2;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Inter",system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:16px;line-height:1.65;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
.wrap{max-width:1220px;width:100%;margin:0 auto;padding-left:clamp(24px,6vw,80px);padding-right:clamp(24px,6vw,80px)}
a{color:inherit}

header{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--hair)}
.nav{display:flex;justify-content:space-between;align-items:center;padding:20px 0}
.brand img{height:38px;width:auto;display:block}
.nav-links{display:flex;gap:40px;align-items:center}
.nav-links a{font-size:12px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;text-decoration:none;white-space:nowrap;transition:color .2s ease}
.nav-links a:hover{color:var(--blue)}

main{flex:1;display:flex;align-items:center}
.contact{padding-top:clamp(90px,12vh,150px);padding-bottom:clamp(90px,12vh,150px)}
.kicker{display:flex;align-items:center;gap:16px;font-size:12px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);margin-bottom:38px}
.kicker::before{content:"";display:block;width:44px;height:1px;background:var(--blue)}
.contact p.lede{max-width:34em;margin-bottom:48px;font-size:1.0625rem}
.email{font-family:"Source Serif 4",Georgia,serif;font-weight:500;font-size:clamp(2rem,6vw,4.8rem);letter-spacing:-0.018em;text-decoration:none;transition:color .2s ease}
.email:hover{color:var(--blue)}
.btn-row{margin-top:56px}
.btn{display:inline-block;font-size:12px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;text-decoration:none;border:1px solid var(--ink);padding:15px 34px;transition:background .2s ease,color .2s ease}
.btn:hover{background:var(--ink);color:#fff}

footer{border-top:1px solid var(--hair);padding:36px 0 48px}
.foot{display:flex;justify-content:space-between;gap:16px;font-size:13px}
.foot a{text-decoration:none;transition:color .2s ease}
.foot a:hover{color:var(--blue)}
@media (max-width:560px){.foot{flex-direction:column}.nav-links{gap:20px}}

@media (prefers-reduced-motion: no-preference){
  .fade{opacity:0;transform:translateY(16px);animation:fadeUp .85s cubic-bezier(.22,.61,.36,1) forwards}
  .fade.d1{animation-delay:.12s}
  .fade.d2{animation-delay:.24s}
  .fade.d3{animation-delay:.36s}
  @keyframes fadeUp{to{opacity:1;transform:none}}
}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <nav class="nav" aria-label="Primary">
      <a class="brand" href="index.html"><img src="logo.png" alt="Triad Senior Living"></a>
      <div class="nav-links">
        <a href="index.html#firm">The firm</a>
        <a href="index.html#operations">Operations</a>
        <a href="index.html">Home</a>
      </div>
    </nav>
  </div>
</header>

<main>
  <div class="wrap contact">
    <p class="kicker fade">Contact</p>
    <p class="lede fade d1">For more information regarding Triad Senior Living, please email us.</p>
    <a class="email fade d2" href="mailto:info@triadsl.com">info@triadsl.com</a>
    <div class="btn-row fade d3"><a class="btn" href="mailto:info@triadsl.com">Email us</a></div>
  </div>
</main>

<footer>
  <div class="wrap foot">
    <span>&copy; 2026 Triad Senior Living</span>
    <a href="mailto:info@triadsl.com">info@triadsl.com</a>
  </div>
</footer>

</body>
</html>
