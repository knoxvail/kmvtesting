<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>motion test — old vs new fire clip</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; color:#eee; font:14px/1.5 monospace; min-height:100vh;
    display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:24px; padding:24px; }
  figure { text-align:center; }
  video { width:min(44vw, 560px); aspect-ratio:1; display:block; background:#000; }
  figcaption { padding:10px 0; color:#c89d5f; letter-spacing:0.1em; }
  p.note { width:100%; text-align:center; color:#888; }
</style>
</head>
<body>
  <p class="note">Plain video tags. No blend, no shader, no page effects. Which one is choppy?</p>
  <figure>
    <video src="assets/motiontest-old.mp4" muted autoplay loop playsinline></video>
    <figcaption>A — OLD clip (born 120fps &rarr; 30fps)</figcaption>
  </figure>
  <figure>
    <video src="assets/soren-fire.mp4" muted autoplay loop playsinline></video>
    <figcaption>B — NEW clip (born 24fps &rarr; interpolated 30fps)</figcaption>
  </figure>
</body>
</html>
